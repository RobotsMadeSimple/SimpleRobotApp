name: Auto Tag

on:
  push:
    branches:
      - main

jobs:
  tag:
    name: Bump version and tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.new_tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: |
          TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          echo "tag=${TAG:-v0.0.0}" >> $GITHUB_OUTPUT

      - name: Determine bump type
        id: bump
        run: |
          LAST_TAG=${{ steps.latest_tag.outputs.tag }}
          if [ "$LAST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --format="%s")
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --format="%s")
          fi

          BUMP="patch"
          while IFS= read -r MSG; do
            PREFIX=$(echo "$MSG" | cut -d: -f1)
            if echo "$PREFIX" | grep -qF '!'; then
              BUMP="major"
              break
            elif echo "$MSG" | grep -qF '🚀'; then
              if [ "$BUMP" != "major" ]; then
                BUMP="minor"
              fi
            fi
          done <<< "$COMMITS"

          echo "bump=${BUMP}" >> $GITHUB_OUTPUT

      - name: Compute new tag
        id: new_tag
        run: |
          TAG=${{ steps.latest_tag.outputs.tag }}
          MAJOR=$(echo $TAG | cut -d. -f1 | tr -d v)
          MINOR=$(echo $TAG | cut -d. -f2)
          PATCH=$(echo $TAG | cut -d. -f3)
          BUMP=${{ steps.bump.outputs.bump }}

          if [ "$BUMP" = "major" ]; then
            NEW_TAG="v$((MAJOR + 1)).0.0"
          elif [ "$BUMP" = "minor" ]; then
            NEW_TAG="v${MAJOR}.$((MINOR + 1)).0"
          else
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "tag=${NEW_TAG}" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.new_tag.outputs.tag }}
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }} ${{ steps.new_tag.outputs.tag }}

  release:
    name: Trigger Release
    needs: tag
    uses: ./.github/workflows/release.yml
    permissions:
      contents: write
    secrets: inherit
    with:
      tag: ${{ needs.tag.outputs.new_tag }}
