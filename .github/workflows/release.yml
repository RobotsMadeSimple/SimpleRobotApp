name: Release

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

jobs:
  electron:
    name: Build Electron (Windows)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Set version from tag
        shell: pwsh
        run: |
          $version = ("${{ inputs.tag || github.ref_name }}").TrimStart('v')
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version='$version';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"

      - name: Build Electron installer
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Rename installer to fixed filename
        run: Get-ChildItem dist\*.exe | Select-Object -First 1 | Rename-Item -NewName "SimpleRobotApp-Setup.exe"
        shell: pwsh

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/SimpleRobotApp-Setup.exe

  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('package-lock.json') }}

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-caches-${{ hashFiles('package-lock.json') }}
          restore-keys: gradle-caches-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Set version from tag
        run: |
          VERSION=$(echo "${{ inputs.tag || github.ref_name }}" | sed 's/^v//')
          jq ".expo.version = \"$VERSION\"" app.json > app.json.tmp && mv app.json.tmp app.json

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease -Dorg.gradle.parallel=true -Dorg.gradle.caching=true

      - name: Rename APK to fixed filename
        run: mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/SimpleRobotApp.apk

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: android/app/build/outputs/apk/release/SimpleRobotApp.apk
